{% extends 'base.html' %}
{% load static %}

{% block title %}Log In - TweetChat{% endblock %}

{% block body %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-logo">
                <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
                    <rect width="40" height="40" rx="12" fill="#6366f1"/>
                    <path d="M12 20L18 26L28 14" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
            <h1>Welcome Back</h1>
            <p>Log in to continue chatting</p>
        </div>
        {% if form.errors %}
        <div class="alert alert-error">Invalid username or password.</div>
        {% endif %}
        <form method="post" class="auth-form" novalidate>
            {% csrf_token %}
            <div class="form-group">
                <label for="id_username">Username</label>
                <input type="text" name="username" id="id_username" placeholder="Username" class="form-input" required autofocus>
            </div>
            <div class="form-group">
                <label for="id_password">Password</label>
                <input type="password" name="password" id="id_password" placeholder="Password" class="form-input" required>
            </div>
            <button type="submit" class="btn btn-primary btn-full">Log In</button>
        </form>
        <p class="auth-footer">Don't have an account? <a href="{% url 'signup' %}">Sign up</a></p>
    </div>
</div>
{% endblock %}
